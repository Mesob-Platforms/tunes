<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Tunes</title>
    <meta name="theme-color" content="#000000" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0a0a0c;
            color: #fff;
            font-family: 'DM Sans', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            text-align: center;
        }
        .icon {
            font-size: 4rem;
            opacity: 0.4;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.35rem; margin: 0 0 0.5rem; font-weight: 700; }
        p { margin: 0; opacity: 0.6; font-size: 0.95rem; max-width: 280px; }
    </style>
</head>
<body>
    <div class="icon" aria-hidden="true">📶</div>
    <h1>You're offline</h1>
    <p>Open Tunes again when you're back online to keep listening.</p>
</body>
</html>
